version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zircon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zircon}
      POSTGRES_DB: ${POSTGRES_DB:-zircon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zircon_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zircon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - zircon_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch ────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - zircon_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── ClamAV ───────────────────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - zircon_net
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ─── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zircon}:${POSTGRES_PASSWORD:-zircon}@postgres:5432/${POSTGRES_DB:-zircon}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-zircon}:${POSTGRES_PASSWORD:-zircon}@postgres:5432/${POSTGRES_DB:-zircon}
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      UPLOAD_DIR: /app/uploads
      DEBUG: ${DEBUG:-false}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - zircon_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zircon}:${POSTGRES_PASSWORD:-zircon}@postgres:5432/${POSTGRES_DB:-zircon}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-zircon}:${POSTGRES_PASSWORD:-zircon}@postgres:5432/${POSTGRES_DB:-zircon}
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    networks:
      - zircon_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Beat ──────────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zircon}:${POSTGRES_PASSWORD:-zircon}@postgres:5432/${POSTGRES_DB:-zircon}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-zircon}:${POSTGRES_PASSWORD:-zircon}@postgres:5432/${POSTGRES_DB:-zircon}
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
    networks:
      - zircon_net
    depends_on:
      redis:
        condition: service_healthy

  # ─── Frontend (React + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - zircon_net
    depends_on:
      - backend

  # ─── Nginx (Reverse Proxy) ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - zircon_net
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  es_data:
  clamav_data:
  uploads_data:

networks:
  zircon_net:
    driver: bridge
